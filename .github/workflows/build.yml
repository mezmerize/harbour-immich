name: Build RPMs

on:
 push:
   tags:
     - 'v*'
   branches:
     - main
 pull_request:
   branches:
     - main
 workflow_dispatch:

permissions:
 contents: write

env:
 OS_VERSION: 4.5.0.16

jobs:
 build:
   runs-on: ubuntu-latest
   name: Build ${{ matrix.flavour }} (${{ matrix.arch }})
   strategy:
     matrix:
       arch: ['armv7hl', 'aarch64', 'i486']
       flavour: ['default', 'harbour']

   steps:
     - uses: actions/checkout@v4
       with:
         submodules: recursive
     - name: Prepare
       run: docker pull coderus/sailfishos-platform-sdk:$OS_VERSION && mkdir output

     - name: Build ${{ matrix.flavour }} ${{ matrix.arch }}
       run: |
         HARBOUR_FLAG=""
         if [ "${{ matrix.flavour }}" = "harbour" ]; then
           HARBOUR_FLAG="--define 'with_harbour 1'"
         fi
         docker run --rm --privileged -v $PWD:/share coderus/sailfishos-platform-sdk:$OS_VERSION /bin/bash -c "
           mkdir -p build ;
           cd build ;
           cp -r /share/* . ;
           mb2 -t SailfishOS-$OS_VERSION-${{ matrix.arch }} build $HARBOUR_FLAG ;
           sudo cp -r RPMS/*.rpm /share/output"

     - name: Upload RPM (${{ matrix.flavour }}-${{ matrix.arch }})
       uses: actions/upload-artifact@v4
       with:
         name: rpm-${{ matrix.flavour }}-${{ matrix.arch }}
         path: output
 release:
   name: Release
   if: startsWith(github.ref, 'refs/tags/v')
   needs:
     - build
   runs-on: ubuntu-latest
   steps:
     - name: Download artifacts
       uses: actions/download-artifact@v4
       with:
         pattern: rpm-*
         merge-multiple: true
       continue-on-error: true
     - name: Extract Version Name
       id: extract_name
       uses: actions/github-script@v7
       with:
         result-encoding: string
         script: |
           return context.payload.ref.replace(/refs\/tags\//, '');
     - name: Create a Release
       uses: softprops/action-gh-release@v2
       with:
         name: ${{ steps.extract_name.outputs.result }}
         draft: false
         prerelease: false
         body: This release was autogenerated.
         files: '*.rpm'
